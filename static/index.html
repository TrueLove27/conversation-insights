<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversation Insights</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Conversation Insights</h1>
    <p>AI call analytics dashboard — portfolio demo with synthetic data</p>
  </header>

  <section class="cards" id="metrics"></section>

  <div class="grid">
    <div class="panel">
      <h2>Recent Calls</h2>
      <div id="call-list"></div>
    </div>
    <div class="panel">
      <h2>Try Analysis</h2>
      <textarea id="transcript" rows="6" placeholder="Paste a sample transcript…">Hi, I'm interested in your pro model. Can I schedule a test ride this weekend?</textarea>
      <button id="analyze-btn">Analyze Transcript</button>
      <pre id="analysis-result"></pre>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
