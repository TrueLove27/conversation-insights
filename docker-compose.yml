services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conversation-insights-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DEBUG=false
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: conversation-insights-ui
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
